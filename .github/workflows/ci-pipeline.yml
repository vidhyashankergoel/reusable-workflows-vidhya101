

name: reusable workflow
# reusable workflow to be callled from other workflow 
on:
  workflow_call: 
    secrets:
      SONAR_TOKEN:
        required: true
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
jobs:

  # ==========================================================
  # JOB 1 : UNIT TEST EXECUTION
  # ==========================================================
  # This job validates the application before any container
  # image is built.
  #
  # Why this job exists:
  # We should not package and publish broken code.
  #
  # What this job does:
  # - Downloads repository code
  # - Installs Python
  # - Installs dependencies
  # - Runs tests
  # - Generates coverage report
  # - Uploads coverage report as artifact

  unit-tests:
    name: Running unit test
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------
      # STEP 1 : CHECKOUT SOURCE CODE
      # ------------------------------------------------------
      # GitHub runners start with an empty filesystem.
      # Your repository code is not automatically present.
      #
      # This action downloads your project files from GitHub
      # into the runner workspace so later steps can use them.

      - name: Checkout Code
        uses: actions/checkout@v4

      # ------------------------------------------------------
      # STEP 2 : SETUP PYTHON
      # ------------------------------------------------------
      # This installs Python 3.10 on the runner.
      #
      # Why needed:
      # Your application and tests are Python-based, so the
      # runner must have the correct Python version available.

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # ------------------------------------------------------
      # STEP 3 : INSTALL DEPENDENCIES
      # ------------------------------------------------------
      # Python applications usually depend on external libraries.
      # These are listed in requirements.txt.
      #
      # What happens here:
      # 1. pip is upgraded
      # 2. all required Python libraries are installed

      - name: Installing Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ------------------------------------------------------
      # STEP 4 : RUN UNIT TESTS AND GENERATE COVERAGE
      # ------------------------------------------------------
      # pytest executes test cases.
      #
      # --junitxml creates a machine-readable test result file
      # that CI systems can consume.
      #
      # --cov=. measures coverage across the whole codebase.
      #
      # --cov-report=xml creates coverage.xml which tools like
      # SonarQube can read.
      #
      # --cov-report=term-missing prints uncovered lines in logs.

      - name: Run unit tests
        run: |
          mkdir reports/
          pytest --junitxml=reports/unit-test-results.xml --cov=. --cov-report=xml:reports/coverage.xml --cov-report=term-missing -v

      # ------------------------------------------------------
      # STEP 5 : UPLOAD REPORTS AS ARTIFACT
      # ------------------------------------------------------
      # Each GitHub job runs on a temporary VM.
      # When the job ends, files on that VM are lost.
      #
      # Artifacts are used to preserve files between jobs.
      # Here we upload test + coverage reports so SonarQube
      # job can download them later.

      - name: Upload code coverage report
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: reports/


  # ==========================================================
  # JOB 2 : CODEQL SECURITY ANALYSIS
  # ==========================================================
  # CodeQL is GitHub's Static Application Security Testing tool.
  #
  # "Static" means it scans the code without actually running it.
  #
  # It helps detect issues like:
  # - SQL injection
  # - command injection
  # - unsafe input handling
  # - insecure coding patterns
  #
  # Results appear in GitHub Security tab.

  codeql:
    name: CodeQL security scan
    runs-on: ubuntu-latest

    # --------------------------------------------------------
    # JOB PERMISSIONS
    # --------------------------------------------------------
    # CodeQL needs permission to upload security findings back
    # into GitHub code scanning results.
    #
    # contents: read
    #   allows reading repository code
    #
    # actions: read
    #   allows reading workflow action metadata
    #
    # security-events: write
    #   allows uploading scan results to Security tab

    permissions:
      actions: read
      contents: read
      security-events: write

    # --------------------------------------------------------
    # MATRIX STRATEGY
    # --------------------------------------------------------
    # Matrix allows running the same job for multiple languages.
    # Here we only scan Python, but this pattern scales well.

    strategy:
      fail-fast: false
      matrix:
        language: ['python']

    steps:
      # ------------------------------------------------------
      # STEP 1 : CHECKOUT REPOSITORY
      # ------------------------------------------------------
      # CodeQL must read the repository source code first.

      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------
      # STEP 2 : INITIALIZE CODEQL
      # ------------------------------------------------------
      # This prepares the CodeQL engine for the selected language.
      #
      # Internally CodeQL builds a database representation of the
      # source code so security queries can be run against it.

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}

      # ------------------------------------------------------
      # STEP 3 : RUN CODEQL ANALYSIS
      # ------------------------------------------------------
      # This executes the security queries and uploads the
      # findings to GitHub Security dashboard.

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: "security"


  # ==========================================================
  # JOB 3 : SONARQUBE QUALITY ANALYSIS
  # ==========================================================
  # SonarQube focuses mainly on code quality and maintainability.
  #
  # It helps detect:
  # - bugs
  # - code smells
  # - duplicate code
  # - maintainability issues
  # - technical debt
  # - test coverage quality
  #
  # This job depends on unit-tests because it uses the
  # coverage report produced there.

  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      # ------------------------------------------------------
      # STEP 1 : CHECKOUT REPOSITORY WITH FULL HISTORY
      # ------------------------------------------------------
      # fetch-depth: 0 means clone full git history.
      #
      # Why needed:
      # SonarQube can use full history for more accurate
      # blame data, branch analysis, and change tracking.

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------
      # STEP 2 : DOWNLOAD COVERAGE ARTIFACT
      # ------------------------------------------------------
      # SonarQube needs the coverage.xml generated by pytest
      # to compute and display test coverage metrics.

      - name: Download Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: code-coverage-report
          path: reports/

      # ------------------------------------------------------
      # STEP 3 : RUN SONARQUBE SCAN
      # ------------------------------------------------------
      # This sends source code and report data to SonarQube /
      # SonarCloud for quality analysis.
      #
      # SONAR_TOKEN is stored in GitHub Secrets because it is
      # sensitive authentication data.

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ------------------------------------------------------
      # STEP 4 : QUALITY GATE CHECK
      # ------------------------------------------------------
      # Quality Gate is a rule-based decision point.
      #
      # It answers:
      # "Does this code meet the minimum quality standard?"
      #
      # Example quality gate rules may include:
      # - coverage must be above threshold
      # - no blocker bugs
      # - no critical vulnerabilities
      # - maintainability must stay above a rating
      #
      # If Quality Gate fails, this job fails, and downstream
      # build/publish should stop.

      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


  # ==========================================================
  # JOB 4 : BUILD DOCKER IMAGE
  # ==========================================================
  # This job creates a Docker image for the application.
  #
  # It starts only after:
  # - CodeQL passes
  # - SonarQube passes
  #
  # This is a good DevSecOps pattern:
  # Validate first, package later.

  Build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [codeql, sonarqube]
    if: success()

    # --------------------------------------------------------
    # JOB OUTPUTS
    # --------------------------------------------------------
    # This exports the generated image tag so later jobs can
    # reuse the exact same versioned image name.
    #
    # steps.vars.outputs.IMAGE_TAGS comes from the step with
    # id: vars below.

    outputs:
      image-tags: ${{ steps.vars.outputs.IMAGE_TAGS }}

    steps:
      # ------------------------------------------------------
      # STEP 1 : CHECKOUT REPOSITORY
      # ------------------------------------------------------
      # Docker build needs application source code and Dockerfile.

      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------
      # STEP 2 : SETUP DOCKER BUILDX
      # ------------------------------------------------------
      # Buildx is Docker's advanced build engine.
      #
      # It supports:
      # - improved caching
      # - multi-platform builds
      # - advanced build features
      #
      # Even for simple builds, using Buildx is standard in CI.

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3.0.0

      # ------------------------------------------------------
      # STEP 3 : GENERATE UNIQUE IMAGE TAG
      # ------------------------------------------------------
      # We generate a unique image tag using:
      # - github.run_id  → unique workflow run number
      # - GITHUB_SHA::7  → first 7 chars of commit hash
      #
      # Example final tag:
      # 123456789-a1b2c3d
      #
      # This avoids ambiguous tags like "latest" and makes
      # builds traceable to a specific commit.
      #
      # $GITHUB_OUTPUT is a special file used by GitHub Actions
      # to expose step outputs to later steps/jobs.

      - name: Generate image tag
        id: vars
        run: |
          IMAGE_TAGS=${{ github.run_id }}-${GITHUB_SHA::7}
          echo "IMAGE_TAGS=$IMAGE_TAGS" >> $GITHUB_OUTPUT

      # ------------------------------------------------------
      # STEP 4 : BUILD DOCKER IMAGE
      # ------------------------------------------------------
      # docker/build-push-action builds the image from Dockerfile.
      #
      # context: .
      #   means current repository folder is the build context
      #
      # file: ./Dockerfile
      #   path of Dockerfile to use
      #
      # tags:
      #   image name + version tag
      #
      # push: false
      #   build locally only, do not upload yet
      #
      # load: true
      #   load built image into local Docker engine on runner
      #   so later steps can docker save / docker tag it

      - name: Build Image(no push)
        uses: docker/build-push-action@v4.0.0
        with:
          context: .
          file: ./Dockerfile
          tags: vidhya101_app:${{ steps.vars.outputs.IMAGE_TAGS }}
          push: false
          load: true

      # ------------------------------------------------------
      # STEP 5 : SAVE DOCKER IMAGE TO TAR FILE
      # ------------------------------------------------------
      # The runner is temporary, so if we want another job to
      # reuse the built image, we must export it as a file.
      #
      # docker save converts the local image into a tar archive.

      - name: Save Docker image as artifact
        run: |
          docker save vidhya101_app:${{ steps.vars.outputs.IMAGE_TAGS }} -o vidhya_app_docker_image.tar

      # ------------------------------------------------------
      # STEP 6 : UPLOAD IMAGE TAR AS ARTIFACT
      # ------------------------------------------------------
      # This preserves the built image between jobs.
      # Publish jobs will download this tar file later.

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: vidhya_app_image
          path: vidhya_app_docker_image.tar


  # ==========================================================
  # JOB 5 : PUBLISH IMAGE TO DOCKER HUB
  # ==========================================================
  # This job downloads the prebuilt image and publishes it
  # to Docker Hub.
  #
  # Important production safety:
  # Publishing should usually happen only on real pushes to main,
  # not on pull_request validation runs.
  #
  # That is why this job is limited to push event on main.

  publish-dockerhub:
    name: Publish image to DockerHub
    runs-on: ubuntu-latest
    needs: Build
    if: success() 

    steps:
      # ------------------------------------------------------
      # STEP 1 : DOWNLOAD IMAGE ARTIFACT
      # ------------------------------------------------------
      # This fetches the tar file created in Build job.

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: vidhya_app_image
          path: .

      # ------------------------------------------------------
      # STEP 2 : LOAD IMAGE INTO LOCAL DOCKER ENGINE
      # ------------------------------------------------------
      # docker load imports the tar file back as a usable
      # Docker image on the runner.

      - name: Load Docker image from artifact
        run: |
          docker load -i vidhya_app_docker_image.tar

      # ------------------------------------------------------
      # STEP 3 : LOGIN TO DOCKER HUB
      # ------------------------------------------------------
      # Authentication is required before pushing images.
      #
      # Credentials are stored in GitHub Secrets:
      # DOCKER_USERNAME
      # DOCKER_PASSWORD

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ------------------------------------------------------
      # STEP 4 : TAG IMAGE FOR DOCKER HUB REPOSITORY
      # ------------------------------------------------------
      # The image currently exists locally as:
      # vidhya101_app:<tag>
      #
      # Docker Hub expects repository format like:
      # dockerhub_username/repository_name:tag
      #
      # We get the tag from Build job output:
      # needs.Build.outputs.image-tags

      - name: Tag image
        run: |
          IMAGE_TAGS="${{ needs.Build.outputs.image-tags }}"
          docker tag vidhya101_app:$IMAGE_TAGS ${{ secrets.DOCKER_USERNAME }}/vidhya_app:$IMAGE_TAGS

      # ------------------------------------------------------
      # STEP 5 : PUSH IMAGE TO DOCKER HUB
      # ------------------------------------------------------
      # This uploads the tagged image to Docker Hub registry.

      - name: Push image to Docker Hub
        run: |
          IMAGE_TAGS="${{ needs.Build.outputs.image-tags }}"
          docker push ${{ secrets.DOCKER_USERNAME }}/vidhya_app:$IMAGE_TAGS


  # ==========================================================
  # JOB 6 : PUBLISH IMAGE TO GHCR
  # ==========================================================
  # GHCR = GitHub Container Registry
  #
  # This job publishes the same prebuilt image to GitHub's
  # own container registry.
  #
  # Like Docker Hub publish, this should happen only on
  # push to main, not on PRs.

  publish-github-container-registry:
    name: Publish image to GitHub Container Registry
    runs-on: ubuntu-latest
    needs: Build
    if: success()
    permissions:
      packages: write
      contents: read
      

    # --------------------------------------------------------
    # JOB PERMISSIONS FOR GHCR PUBLISH
    # --------------------------------------------------------
    # To push images to GHCR using GITHUB_TOKEN,
    # packages: write permission is required.
    #
    # contents: read allows reading repository metadata.

    permissions:
      contents: read
      packages: write

    steps:
      # ------------------------------------------------------
      # STEP 1 : DOWNLOAD IMAGE ARTIFACT
      # ------------------------------------------------------
      # Download the image tar file created in Build job.

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: vidhya_app_image
          path: .

      # ------------------------------------------------------
      # STEP 2 : LOAD IMAGE INTO LOCAL DOCKER ENGINE
      # ------------------------------------------------------
      # Converts tar archive back into local Docker image.

      - name: Load Docker image from artifact
        run: |
          docker load -i vidhya_app_docker_image.tar

      # ------------------------------------------------------
      # STEP 3 : LOGIN TO GHCR
      # ------------------------------------------------------
      # ghcr.io is GitHub Container Registry.
      #
      # github.actor
      #   is the username that triggered the workflow
      #
      # secrets.GITHUB_TOKEN
      #   is an automatically generated token provided by GitHub
      #   for the current workflow run
      #
      # This token can be used for registry auth if permissions
      # are correctly granted.

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------
      # STEP 4 : TAG IMAGE FOR GHCR
      # ------------------------------------------------------
      # GHCR image naming pattern:
      # ghcr.io/<owner>/<image>:<tag>
      #
      # github.repository_owner gives the repository owner/org.

      - name: Tag image
        run: |
          IMAGE_TAGS="${{ needs.Build.outputs.image-tags }}"
          docker tag vidhya101_app:$IMAGE_TAGS ghcr.io/${{ github.repository_owner }}/vidhya_app:$IMAGE_TAGS

      # ------------------------------------------------------
      # STEP 5 : PUSH IMAGE TO GHCR
      # ------------------------------------------------------
      # Uploads the tagged image into GitHub Container Registry.

      - name: Push image to GHCR
        run: |
          IMAGE_TAGS="${{ needs.Build.outputs.image-tags }}"
          docker push ghcr.io/${{ github.repository_owner }}/vidhya_app:$IMAGE_TAGS
