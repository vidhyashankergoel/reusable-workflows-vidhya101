# ===============================================================
# WORKFLOW LEVEL EXPLANATION
# ===============================================================
# This file defines a reusable GitHub Actions workflow.
#
# "Reusable workflow" means:
# This pipeline is NOT triggered directly by push or PR.
# Instead, another workflow calls this workflow using:
#
# uses: <repo>/.github/workflows/<workflow-file>.yml
#
# This allows you to reuse the same CI/CD pipeline
# across many repositories.
#
# Example:
# repo A
# repo B
# repo C
# All can call this single workflow instead of duplicating logic.

name: reusable workflow

# ===============================================================
# WORKFLOW TRIGGER
# ===============================================================
# "workflow_call" means:
# This workflow runs ONLY when another workflow calls it.
#
# Example caller workflow:
#
# jobs:
#   ci:
#     uses: org/repo/.github/workflows/ci.yml@main

on:
  workflow_call:

    # ===========================================================
    # INPUT PARAMETERS
    # ===========================================================
    # Inputs allow the caller workflow to control
    # which jobs should run.
    #
    # Think of inputs like function parameters.

    inputs:

      # ---------------------------------------------------------
      # INPUT 1 : RUN UNIT TESTS
      # ---------------------------------------------------------
      # If true → unit tests job will execute
      # If false → unit tests job will be skipped
      #
      # This helps reuse the pipeline in different situations.

      run_unit_tests:
        description: "run unit tests"
        required: false
        default: true
        type: boolean

      # ---------------------------------------------------------
      # INPUT 2 : RUN BUILD
      # ---------------------------------------------------------
      # Controls Docker build job

      run_build:
        description: "create application image"
        required: false
        default: true
        type: boolean

      # ---------------------------------------------------------
      # INPUT 3 : RUN CODEQL
      # ---------------------------------------------------------
      # Controls security scanning

      run_codeql:
        description: "run codeql security scan"
        required: false
        default: true
        type: boolean

      # ---------------------------------------------------------
      # INPUT 4 : RUN SONARQUBE
      # ---------------------------------------------------------
      # Controls code quality scan

      run_sonarqube:
        description: "run sonarqube code quality scan"
        required: false
        default: false
        type: boolean

      # ---------------------------------------------------------
      # INPUT 5 : RUN DOCKERHUB PUBLISH
      # ---------------------------------------------------------
      # Controls DockerHub publishing

      run_dockerhub_publish:
        description: "publish image to dockerhub"
        required: false
        default: false
        type: boolean

      # ---------------------------------------------------------
      # INPUT 6 : RUN GHCR PUBLISH
      # ---------------------------------------------------------
      # Controls GitHub Container Registry publish

      run_ghcr_publish:
        description: "publish image to github container registry"
        required: false
        default: false
        type: boolean


    # ===========================================================
    # SECRETS PASSED FROM CALLER WORKFLOW
    # ===========================================================
    # Reusable workflows cannot access secrets automatically.
    # They must be declared here.
    #
    # The caller workflow will pass these secrets.

    secrets:

      SONAR_TOKEN:
        required: true

      DOCKER_USERNAME:
        required: true

      DOCKER_PASSWORD:
        required: true


# ===============================================================
# JOBS SECTION
# ===============================================================
# Jobs define independent units of execution.
#
# Each job runs on a fresh virtual machine.

jobs:


  # ============================================================
  # JOB 1 : UNIT TEST EXECUTION
  # ============================================================

  unit-tests:

    # ----------------------------------------------------------
    # JOB CONDITION
    # ----------------------------------------------------------
    # This condition checks the workflow input.
    #
    # If input.run_unit_tests == true
    # → job runs
    #
    # If false
    # → job skipped

    if: ${{ inputs.run_unit_tests }}

    name: Running unit test
    runs-on: ubuntu-latest

    steps:

      # --------------------------------------------------------
      # STEP 1 : CHECKOUT SOURCE CODE
      # --------------------------------------------------------
      # GitHub runners start with an empty machine.
      #
      # This step downloads repository files
      # into the runner.

      - name: Checkout Code
        uses: actions/checkout@v4


      # --------------------------------------------------------
      # STEP 2 : INSTALL PYTHON
      # --------------------------------------------------------
      # Installs Python runtime required by the app.

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'


      # --------------------------------------------------------
      # STEP 3 : INSTALL DEPENDENCIES
      # --------------------------------------------------------
      # Installs required Python packages.

      - name: Installing Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      # --------------------------------------------------------
      # STEP 4 : RUN TESTS
      # --------------------------------------------------------
      # Executes test suite using pytest.
      #
      # coverage.xml will be used by SonarQube.

      - name: Run unit tests
        run: |
          mkdir reports/
          pytest --junitxml=reports/unit-test-results.xml --cov=. --cov-report=xml:reports/coverage.xml --cov-report=term-missing -v


      # --------------------------------------------------------
      # STEP 5 : UPLOAD TEST ARTIFACTS
      # --------------------------------------------------------
      # Artifacts persist files between jobs.

      - name: Upload code coverage report
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: reports/



  # ============================================================
  # JOB 2 : CODEQL SECURITY SCAN
  # ============================================================

  codeql:

    if: ${{ inputs.run_codeql }}

    name: CodeQL security scan
    runs-on: ubuntu-latest

    # ----------------------------------------------------------
    # JOB PERMISSIONS
    # ----------------------------------------------------------
    # CodeQL requires permission to upload results.

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['python']

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      # Initialize CodeQL engine

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}

      # Run CodeQL scan

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: "security"



  # ============================================================
  # JOB 3 : SONARQUBE ANALYSIS
  # ============================================================

  sonarqube:

    if: ${{ inputs.run_sonarqube }}

    name: SonarQube Scan
    runs-on: ubuntu-latest

    # ----------------------------------------------------------
    # JOB DEPENDENCY
    # ----------------------------------------------------------
    # This job waits for unit-tests job.

    needs: unit-tests

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: code-coverage-report
          path: reports/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}



  # ============================================================
  # JOB 4 : BUILD DOCKER IMAGE
  # ============================================================

  Build:

    # ----------------------------------------------------------
    # JOB CONDITION
    # ----------------------------------------------------------
    # success() ensures previous jobs succeeded.
    #
    # inputs.run_build must also be true.

    if: ${{ success() && inputs.run_build }}

    name: Build Docker image
    runs-on: ubuntu-latest

    # This job depends on these jobs

    needs: [unit-tests, codeql, sonarqube]

    outputs:
      image-tags: ${{ steps.vars.outputs.IMAGE_TAGS }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3.0.0


      # --------------------------------------------------------
      # GENERATE IMAGE TAG
      # --------------------------------------------------------
      # Tag format:
      #
      # run_id + short commit SHA
      #
      # Example
      # 123456-a1b2c3d

      - name: Generate image tag
        id: vars
        run: |
          IMAGE_TAGS=${{ github.run_id }}-${GITHUB_SHA::7}
          echo "IMAGE_TAGS=$IMAGE_TAGS" >> $GITHUB_OUTPUT


      - name: Build Image(no push)
        uses: docker/build-push-action@v4.0.0
        with:
          context: .
          file: ./Dockerfile
          tags: vidhya101_app:${{ steps.vars.outputs.IMAGE_TAGS }}
          push: false
          load: true


      - name: Save Docker image as artifact
        run: |
          docker save vidhya101_app:${{ steps.vars.outputs.IMAGE_TAGS }} -o vidhya_app_docker_image.tar


      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: vidhya_app_image
          path: vidhya_app_docker_image.tar



  # ============================================================
  # JOB 5 : DOCKERHUB PUBLISH
  # ============================================================

  publish-dockerhub:

    if: ${{ inputs.run_dockerhub_publish }}

    name: Publish image to DockerHub
    runs-on: ubuntu-latest
    needs: Build

    steps:

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: vidhya_app_image
          path: .


      - name: Load Docker image from artifact
        run: |
          docker load -i vidhya_app_docker_image.tar


      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Tag image
        run: |
          IMAGE_TAGS="${{ needs.Build.outputs.image-tags }}"
          docker tag vidhya101_app:$IMAGE_TAGS ${{ secrets.DOCKER_USERNAME }}/vidhya_app:$IMAGE_TAGS


      - name: Push image to Docker Hub
        run: |
          IMAGE_TAGS="${{ needs.Build.outputs.image-tags }}"
          docker push ${{ secrets.DOCKER_USERNAME }}/vidhya_app:$IMAGE_TAGS



  # ============================================================
  # JOB 6 : GHCR PUBLISH
  # ============================================================

  publish-github-container-registry:

    if: ${{ inputs.run_ghcr_publish }}

    name: Publish image to GitHub Container Registry
    runs-on: ubuntu-latest
    needs: Build
